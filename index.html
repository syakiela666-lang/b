<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Blockzi Solver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        
        <div class="left-col">
            <div class="compact-panel board-col">
                <div class="panel-header-compact">
                    <span id="ai-status" class="status-badge">Status: Mode Input</span>
                    <button id="clear-board-btn" class="btn-tiny btn-danger">🗑️ Reset Board</button>
                </div>
                <div class="board-container">
                    <div class="coord-corner"></div>
                    <div class="coord-top">
                        <div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div><div>7</div><div>8</div>
                    </div>
                    <div class="coord-left">
                        <div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div><div>7</div><div>8</div>
                    </div>
                    <div id="main-board" class="board"></div>
                </div>
            </div>

            <div class="compact-panel control-col">
                <div class="panel-header-compact" style="margin-bottom: 8px;">
                    <span style="font-size:12px; color:#94a3b8; font-weight:bold;">Antrean (Tap utk Hapus):</span>
                </div>
                <div class="queues-container" id="spawner" style="margin-bottom: 12px;">
                    <div class="queue-slot empty" data-idx="0">Kosong</div>
                    <div class="queue-slot empty" data-idx="1">Kosong</div>
                    <div class="queue-slot empty" data-idx="2">Kosong</div>
                </div>
                <div class="panel-header-compact" style="margin-bottom: 8px;">
                    <span style="font-size:12px; color:#f59e0b; font-weight:bold;">💡 Ketersediaan Bantuan:</span>
                </div>
                <div class="bantuan-toggles" style="margin-bottom: 15px;">
                    <div class="bantuan-item">
                        <label class="switch">
                            <input type="checkbox" id="use-1x1-toggle" checked>
                            <span class="slider"></span>
                        </label>
                        <span>1x1</span>
                    </div>
                    <div class="bantuan-item">
                        <label class="switch">
                            <input type="checkbox" id="use-hammer-toggle" checked>
                            <span class="slider"></span>
                        </label>
                        <span>Palu</span>
                    </div>
                    <div class="bantuan-item">
                        <label class="switch">
                            <input type="checkbox" id="use-bomb-toggle" checked>
                            <span class="slider"></span>
                        </label>
                        <span>Bomb</span>
                    </div>
                </div>
                <div class="action-buttons-compact">
                    <button id="calculate-btn" class="btn-compact btn-primary" style="padding: 10px;">🧠 CARI LANGKAH (AI)</button>
                    <button id="apply-btn" class="btn-compact btn-success" style="padding: 10px;" disabled>🚀 EKSEKUSI</button>
                </div>
            </div>

            <details class="compact-panel details-builder">
                <summary style="font-size:12px; color:#94a3b8; cursor:pointer; font-weight:bold;">🛠️ Custom Builder (Buat Balok)</summary>
                <div style="margin-top:10px;">
                    <div class="builder-grid" id="builderGrid"></div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <button id="save-lib-btn" class="btn-compact btn-secondary" style="flex:1; padding:8px;">Simpan Balok</button>
                        <button id="clear-builder-btn" class="btn-compact btn-danger" style="flex:1; padding:8px;">Reset</button>
                    </div>
                </div>
            </details>
        </div>

        <div class="right-col">
            <div class="compact-panel library-panel">
                <div class="panel-header-compact" style="margin-bottom: 10px;">
                    <span style="font-size:12px; color:#94a3b8; font-weight:bold;">📚 Koleksi Balok</span>
                </div>
                <div id="palette" class="library-grouped-container">
                    </div>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
